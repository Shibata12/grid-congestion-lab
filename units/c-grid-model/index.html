      <p>
        この領域では、実際の電力系統を計算機で扱える「モデル」として表現する方法を学びます。
        母線（ノード）、送電線・変圧器（ブランチ）、アドミタンス行列といった概念を用いて、
        現実の系統を数式とデータの構造に落とし込みます。
        ここで作るモデルが、領域Dの混雑計算アルゴリズムの入力になります。
      </p>
