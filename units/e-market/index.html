      <p>
        この領域では、電力市場の仕組みと、市場が系統運用に与える影響を学びます。
        卸電力取引、計画値同時同量、バランシンググループ（BG）といった枠組みを通じて、
        発電・需要の計画値がどのように決まるかを扱います。
        市場で確定した計画値は、領域Dの混雑計算の重要な入力になります。
      </p>
    </section>

        </p>
